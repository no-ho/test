<section id="galleries">
  <h1>Galleries</h1>
  <div class="section-body">
    <ul class="gallery-list">
      {% assign sorted_galleries = site.galleries | sort: "title" | reverse %}
      {% for gallery in sorted_galleries %}
        <li>
          <a href="{{ gallery.url | relative_url }}">
            {{ gallery.title }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </div>
</section>
