<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: white;
      color: #222;
      line-height: 1.7;
    }

    header {
      background: lightgreen;
      padding: 16px 24px;
    }

    nav {
      display: flex;
      justify-content: space-evenly;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      color: black;
      font-weight: bold;
      padding: 8px 14px;
      border-radius: 8px;
      transition: 0.2s;
    }

    nav a:hover {
      background: rgba(255,255,255,0.5);
    }

    hr {
      border: none;
      border-top: 2px solid #ccc;
      margin: 0;
    }

    main {
      background: white;
      padding: 40px 24px;
      min-height: 80vh;
    }

    section {
      max-width: 900px;
      margin: 0 auto 80px auto;
    }

    h1 {
      margin-top: 0;
    }

    .back-to-top {
      text-align: center;
      margin: 60px 0;
    }

    .back-to-top a {
      display: inline-block;
      text-decoration: none;
      background: #ddd;
      color: black;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: bold;
    }

    .back-to-top a:hover {
      background: #ccc;
    }

    footer {
      background: #e0e0e0;
      padding: 32px 24px;
    }

    footer .footer-content {
      max-width: 900px;
      margin: 0 auto;
    }

    footer a {
      color: black;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    .github {
      margin-top: 16px;
      font-size: 0.9em;
      color: #555;
    }
  </style>
</head>

<body id="top">

  <!-- 上部メニュー -->
  <header>
    <nav>
      <a href="{{ '/' | relative_url }}">Top </a>
      <a href="{{ '/#about' | relative_url }}">About</a>
      <a href="{{ '/#galleries' | relative_url }}">Galleries</a>
    </nav>
  </header>

  <hr>

  <!-- ページ内容 -->
  <main>
    {{ content }}
  </main>

  <hr>

  <!-- フッター -->
  <footer>
    <div class="footer-content">
      
      <!-- 上へ戻る -->
      <div class="back-to-top">
        <a href="#top"> ↑ </a>
      </div>

      <p>SNS Links</p>

      <p>
        X :
        <a href="https://x.com/" target="_blank">
          @○○
        </a>
      </p>

      <div class="github">
        Hosted on GitHub Pages
      </div>

    </div>
  </footer>

</body>
</html>
