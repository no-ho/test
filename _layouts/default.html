<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    body {
      font-family: sans-serif;
      line-height: 1.7;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 16px;
      background: #fafafa;
      color: #222;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
    }

    a {
      color: #0066cc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    ul {
      padding-left: 1.2em;
    }

    li {
      margin: 0.4em 0;
    }
  </style>
</head>
<body>
  <main class="card">
    {{ content }}
  </main>
</body>
</html>
