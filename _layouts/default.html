<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    body {
      font-family: sans-serif;
      line-height: 1.7;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 16px;
      background: #fafafa;
      color: #222;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
    }

    a {
      color: #0066cc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    ul {
      padding-left: 1.2em;
    }

    li {
      margin: 0.4em 0;
    }
    header {
  margin-bottom: 20px;
  }

  .home-button {
    display: inline-block;
    padding: 8px 14px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: white;
    color: #222;
    text-decoration: none;
    font-weight: bold;
  }

  .home-button:hover {
    background: #f0f0f0;
  }
  </style>
</head>
<body>
  <header>
    <a class="home-button" href="{{ '/' | relative_url }}">
      TOP
    </a>
  </header>

  <main class="card">
    {{ content }}
  </main>

</body>
</html>
